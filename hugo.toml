baseURL = "https://texasbiblebowl.org/"
locale = "en-us"
title = "Texas Bible Bowl"

[params]
  description   = "Making God's Word Important — Annual Bible knowledge competition for students 3rd grade through adult."
  tagline       = "Making God's Word Important"
  eventYear     = "2026"
  eventDates    = "March 27–29, 2026"
  eventTheme    = "Unbreakable"
  eventScripture = "Joshua, Judges & Ruth"
  facebook      = "https://www.facebook.com/TexasBibleBowl"   # update if needed
  youtube       = "https://www.youtube.com/channel/UCdlu_qTP5cmoQrNGJSDRbcg"
  mailingAddress = "10431 Remuda View Drive, San Antonio, TX 78254"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true   # allows raw HTML in .md files (needed for maps, forms, embeds)
  [markup.highlight]
    noClasses = false

