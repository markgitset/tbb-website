baseURL = "https://texasbiblebowl.org/"
locale = "en-us"
title = "Texas Bible Bowl"
# Rewrite root-relative URLs written in content (e.g. /images/..., /uploads/...) with the
# build's baseURL so they keep the path prefix on the GitHub Pages subpath deployment.
canonifyURLs = true

# Emit a JSON search index (/index.json) alongside the home page, consumed by the
# client-side search on /search/. Template: layouts/index.json.
[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  description   = "Making God's Word Important — Annual Bible knowledge competition for students 3rd grade through adult."
  tagline       = "Making God's Word Important"
  eventYear     = "2027"
  eventDateRange = "April 2–4"   # year comes from eventYear; compose in templates
  eventTheme    = "TBD"
  eventScripture = "Acts"
  scholarshipAmount = "$25,000"   # total awarded in the prior year (eventYear - 1)
  registrationOpens = "in February"      # Month day; year derived from eventYear
  registrationDeadline = "TBD"   # Month day; year derived from eventYear
  scholarshipDeadline = "TBD"       # Month day; year derived from eventYear
  # Prices / amounts
  priceAdult = "TBD (Was $85 in 2026)"     # adults (standard), per person
  priceChild = "TBD (Was $65 in 2026)"     # children ages 3–8, per person
  priceTshirt = "TBD (Was $10 in 2026)"    # extra t-shirts, each
  tbbScholarshipAmount = "$1,000"
  maryOrbisonAmount = "$1,500"
  paulHendricksonAmount = "TBD"
  facebook      = "https://www.facebook.com/TexasBibleBowl"
  youtube       = "https://www.youtube.com/channel/UCdlu_qTP5cmoQrNGJSDRbcg"
  mailingAddress = "10431 Remuda View Drive, San Antonio, TX 78254"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true   # allows raw HTML in .md files (needed for maps, forms, embeds)
  [markup.highlight]
    noClasses = false

