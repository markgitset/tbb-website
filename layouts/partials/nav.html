<nav class="navbar navbar-expand-lg navbar-dark" style="background-color:var(--tbb-navy);">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center gap-2 fw-bold" href="/">
      <img src="/images/tbb-logo.png" alt="Texas Bible Bowl logo" height="38" class="nav-logo">
      Texas Bible Bowl
    </a>
    <button class="navbar-toggler" type="button"
            data-bs-toggle="collapse" data-bs-target="#mainNav"
            aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="mainNav">
      <ul class="navbar-nav ms-auto">

        {{ range .Site.Menus.main }}
          {{ if .HasChildren }}
            <li class="nav-item dropdown">
              <a class="nav-link dropdown-toggle" href="{{ .URL }}"
                 role="button" data-bs-toggle="dropdown" aria-expanded="false">
                {{ .Name }}
              </a>
              <ul class="dropdown-menu dropdown-menu-end">
                {{ range .Children }}
                  <li><a class="dropdown-item" href="{{ .URL }}">{{ .Name }}</a></li>
                {{ end }}
              </ul>
            </li>
          {{ else }}
            <li class="nav-item">
              <a class="nav-link" href="{{ .URL }}">{{ .Name }}</a>
            </li>
          {{ end }}
        {{ end }}

      </ul>
    </div>
  </div>
</nav>
